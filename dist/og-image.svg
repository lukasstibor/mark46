<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#B22222" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#B22222" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="30%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="75%" stop-color="#080808" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="1"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#B22222" opacity="0.18"/>
    </pattern>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B22222" stop-opacity="0"/>
      <stop offset="40%" stop-color="#B22222" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#B22222" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B22222" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow46">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Rings centered at 600, 315 -->
  <circle cx="600" cy="315" r="400" fill="none" stroke="#B22222" stroke-width="1" stroke-dasharray="10 28" opacity="0.06"/>
  <circle cx="600" cy="315" r="280" fill="none" stroke="#B22222" stroke-width="0.8" stroke-dasharray="5 18" opacity="0.09"/>
  <circle cx="600" cy="315" r="160" fill="none" stroke="#B22222" stroke-width="1" stroke-dasharray="14 8" opacity="0.14"/>

  <!-- Hex frame -->
  <polygon points="600,80 800,162 822,350 700,482 500,482 378,350 400,162"
    fill="none" stroke="#B22222" stroke-width="1" opacity="0.05"/>

  <!-- Scan line -->
  <rect x="0" y="314" width="1200" height="1" fill="url(#scan)"/>

  <!-- HUD corners -->
  <path d="M56,56 L56,92 M56,56 L92,56" stroke="#B22222" stroke-width="2" opacity="0.3" fill="none"/>
  <path d="M1144,56 L1144,92 M1144,56 L1108,56" stroke="#B22222" stroke-width="2" opacity="0.3" fill="none"/>
  <path d="M56,574 L56,538 M56,574 L92,574" stroke="#B22222" stroke-width="2" opacity="0.3" fill="none"/>
  <path d="M1144,574 L1144,538 M1144,574 L1108,574" stroke="#B22222" stroke-width="2" opacity="0.3" fill="none"/>

  <!-- HUD left text -->
  <text x="56" y="288" font-family="monospace" font-size="10" letter-spacing="3" fill="#B22222" opacity="0.5">SYS: ONLINE</text>
  <text x="56" y="308" font-family="monospace" font-size="10" letter-spacing="3" fill="#252525">SECTOR: TECH</text>
  <text x="56" y="328" font-family="monospace" font-size="10" letter-spacing="3" fill="#252525">STATUS: ACTIVE</text>

  <!-- HUD right text -->
  <text x="1144" y="288" font-family="monospace" font-size="10" letter-spacing="3" fill="#252525" text-anchor="end">MARK_046</text>
  <text x="1144" y="308" font-family="monospace" font-size="10" letter-spacing="3" fill="#252525" text-anchor="end">EST. 2023</text>

  <!-- MARK XLVI label -->
  <line x1="370" y1="185" x2="490" y2="185" stroke="#B22222" stroke-width="0.8" opacity="0.3"/>
  <text x="600" y="190" font-family="monospace" font-size="12" letter-spacing="10" fill="#B22222" text-anchor="middle" opacity="0.6">MARK  XLVI</text>
  <line x1="710" y1="185" x2="830" y2="185" stroke="#B22222" stroke-width="0.8" opacity="0.3"/>

  <!-- MARK text (cream) — anchored right at x=580 -->
  <text x="560" y="330"
    font-family="'Space Grotesk','Arial Black','Helvetica Neue',sans-serif"
    font-size="140" font-weight="700" letter-spacing="-2"
    fill="#f0ede8" text-anchor="end">MARK</text>

  <!-- Space gap then 46 (red) — anchored left at x=620 -->
  <text x="640" y="330"
    font-family="'Space Grotesk','Arial Black','Helvetica Neue',sans-serif"
    font-size="140" font-weight="700" letter-spacing="-2"
    fill="#B22222" filter="url(#glow46)" text-anchor="start">46</text>

  <!-- Divider -->
  <line x1="550" y1="350" x2="650" y2="350" stroke="#B22222" stroke-width="1.5" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="396" font-family="monospace" font-size="13" letter-spacing="7" fill="#404040" text-anchor="middle">PRIVATE  INVESTMENT  COMPANY</text>

  <!-- Description -->
  <text x="600" y="444" font-family="'Inter','Arial',sans-serif" font-size="16" fill="#505050" text-anchor="middle">Focusing on technology and real estate.</text>

  <!-- Reactor core -->
  <circle cx="600" cy="315" r="4" fill="#B22222" opacity="0.75"/>
  <circle cx="600" cy="315" r="12" fill="none" stroke="#B22222" stroke-width="0.8" opacity="0.2"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- URL -->
  <text x="600" y="596" font-family="monospace" font-size="11" letter-spacing="5" fill="#2a2a2a" text-anchor="middle">mark46.com</text>
</svg>
