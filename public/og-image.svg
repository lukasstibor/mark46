<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#B22222" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#B22222" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="30%" stop-color="#080808" stop-opacity="0"/>
      <stop offset="72%" stop-color="#080808" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="1"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#B22222" opacity="0.14"/>
    </pattern>
    <filter id="glow46">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080808"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Subtle rings -->
  <circle cx="600" cy="315" r="420" fill="none" stroke="#B22222" stroke-width="1" stroke-dasharray="10 28" opacity="0.07"/>
  <circle cx="600" cy="315" r="290" fill="none" stroke="#B22222" stroke-width="0.8" stroke-dasharray="5 18" opacity="0.10"/>
  <circle cx="600" cy="315" r="170" fill="none" stroke="#B22222" stroke-width="1" stroke-dasharray="14 8" opacity="0.15"/>

  <!-- HUD corners -->
  <path d="M52,52 L52,94 M52,52 L94,52" stroke="#B22222" stroke-width="2" opacity="0.5" fill="none"/>
  <path d="M1148,52 L1148,94 M1148,52 L1106,52" stroke="#B22222" stroke-width="2" opacity="0.5" fill="none"/>
  <path d="M52,578 L52,536 M52,578 L94,578" stroke="#B22222" stroke-width="2" opacity="0.5" fill="none"/>
  <path d="M1148,578 L1148,536 M1148,578 L1106,578" stroke="#B22222" stroke-width="2" opacity="0.5" fill="none"/>

  <!-- Top label -->
  <line x1="390" y1="148" x2="520" y2="148" stroke="#B22222" stroke-width="0.8" opacity="0.45"/>
  <text x="600" y="153" font-family="monospace" font-size="13" letter-spacing="10" fill="#B22222" text-anchor="middle" opacity="0.75">MARK  XLVI</text>
  <line x1="680" y1="148" x2="810" y2="148" stroke="#B22222" stroke-width="0.8" opacity="0.45"/>

  <!-- MARK text (cream) -->
  <text x="556" y="325"
    font-family="'Arial Black','Helvetica Neue',sans-serif"
    font-size="148" font-weight="900" letter-spacing="-4"
    fill="#f0ede8" text-anchor="end">MARK</text>

  <!-- 46 (red) -->
  <text x="644" y="325"
    font-family="'Arial Black','Helvetica Neue',sans-serif"
    font-size="148" font-weight="900" letter-spacing="-4"
    fill="#B22222" filter="url(#glow46)" text-anchor="start">46</text>

  <!-- Divider line -->
  <line x1="520" y1="348" x2="680" y2="348" stroke="#B22222" stroke-width="1.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="600" y="386" font-family="monospace" font-size="14" letter-spacing="7" fill="#c8c2b8" text-anchor="middle">PRIVATE  INVESTMENT  COMPANY</text>

  <!-- Founder -->
  <text x="600" y="422" font-family="'Arial',sans-serif" font-size="16" fill="#807870" text-anchor="middle" letter-spacing="1">Founded by Lukas Stibor</text>

  <!-- Description line -->
  <text x="600" y="462" font-family="'Arial',sans-serif" font-size="15" fill="#606060" text-anchor="middle">Technology  ·  Real Estate  ·  Unconventional Deals</text>

  <!-- Reactor core -->
  <circle cx="600" cy="315" r="5" fill="#B22222" opacity="0.8"/>
  <circle cx="600" cy="315" r="14" fill="none" stroke="#B22222" stroke-width="0.8" opacity="0.25"/>

  <!-- Vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- URL footer -->
  <text x="600" y="593" font-family="monospace" font-size="12" letter-spacing="5" fill="#666666" text-anchor="middle">mark46.com</text>
</svg>
